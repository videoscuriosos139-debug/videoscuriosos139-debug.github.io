<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundo Kobu — Nuestras redes</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(160deg,#aee9f5 0%,#cdeccf 55%,#fff6c9 100%);
    color:#2b3a4a; min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:32px 18px;
  }
  .card{ width:100%; max-width:420px; text-align:center; }
  .logo{ font-size:56px; margin-bottom:4px; }
  h1{ font-size:30px; font-weight:900; color:#5a4ea8; letter-spacing:.5px; }
  .tag{ color:#4a6275; font-size:15px; margin:6px 0 26px; font-weight:600; }
  a.btn{
    display:flex; align-items:center; gap:14px; width:100%;
    padding:16px 20px; margin:13px 0; border-radius:20px;
    text-decoration:none; color:#fff; font-weight:800; font-size:18px;
    box-shadow:0 4px 0 rgba(0,0,0,.12); transition:transform .12s ease;
  }
  a.btn:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.12); }
  a.yt{ background:#ff4d4d; } a.tt{ background:#222; }
  a.ig{ background:linear-gradient(45deg,#f9a03f,#ed5b7c,#b65fcf); }
  a.fb{ background:#4a90e2; }
  .ico{ font-size:22px; width:26px; text-align:center; }
  footer{ margin-top:24px; color:#6a8197; font-size:13px; font-weight:600; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🐶</div>
    <h1>Mundo Kobu</h1>
    <div class="tag">Diversión para niños y niñas 🌈</div>

    <a class="btn yt" href="https://www.youtube.com/@MundoKobu"><span class="ico">▶️</span> YouTube</a>
    <a class="btn tt" href="https://www.tiktok.com/@mundokobu"><span class="ico">🎵</span> TikTok</a>
    <a class="btn ig" href="https://www.instagram.com/mundokobu/"><span class="ico">📸</span> Instagram</a>
    <a class="btn fb" href="https://www.facebook.com/profile.php?id=61590850408329"><span class="ico">👍</span> Facebook</a>

    <footer>🐾 Kobu te espera</footer>
  </div>
</body>
</html>
